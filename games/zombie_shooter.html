<h2 class="sr-only">Zombie Defense Shooter — a wave-based survival game where you shoot zombies coming from the left</h2>
<canvas id="c" style="display:block;width:100%;border-radius:8px;cursor:crosshair;touch-action:none;"></canvas>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 680, H = 400;
cv.width = W; cv.height = H;

let state = 'menu';
let score=0, wave=1, waveKills=0, waveTarget=8;
let pHP=100, maxHP=100, ammo=30, maxAmmo=30;
let reloading=false, reloadT=0;
let spawnT=0, spawnI=2200;
let waveOver=false, waveDelay=0;
let mx=W/2, my=H/2;
let bullets=[], enemies=[], parts=[], lastT=0;

const player = {x:W-70, y:H/2};

function getPos(e) {
  const r = cv.getBoundingClientRect();
  const sx = W/r.width, sy = H/r.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - r.left)*sx, (src.clientY - r.top)*sy];
}

cv.addEventListener('mousemove', e => [mx,my]=getPos(e));
cv.addEventListener('click', e => {
  if(state==='menu'||state==='gameover') { start(); return; }
  if(state==='play') fire();
});
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  [mx,my]=getPos(e);
  if(state==='menu'||state==='gameover') { start(); return; }
  if(state==='play') fire();
},{passive:false});
cv.addEventListener('touchmove', e => { e.preventDefault(); [mx,my]=getPos(e); },{passive:false});
document.addEventListener('keydown', e => {
  if((e.key==='r'||e.key==='R') && state==='play') reload();
  if(e.key===' ') { e.preventDefault(); state==='play' ? fire() : start(); }
});

function start() {
  state='play'; score=0; wave=1; waveKills=0; waveTarget=8;
  pHP=100; ammo=30; reloading=false; reloadT=0;
  spawnT=0; spawnI=2200; waveOver=false; waveDelay=0;
  bullets=[]; enemies=[]; parts=[]; player.y=H/2;
}

function fire() {
  if(reloading||ammo<=0) { reload(); return; }
  ammo--;
  const ang = Math.atan2(my-player.y, mx-player.x);
  bullets.push({x:player.x-10, y:player.y, vx:Math.cos(ang)*14, vy:Math.sin(ang)*14});
  spark(player.x-10, player.y, ang, '#FFD700', 5);
  if(ammo===0) setTimeout(reload, 200);
}

function reload() {
  if(reloading||ammo===maxAmmo) return;
  reloading=true; reloadT=1.8;
}

function spark(x, y, ang, col, n) {
  for(let i=0;i<n;i++) {
    const a = ang+(Math.random()-.5)*0.8, sp=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.4,max:.4,r:2.5,col});
  }
}

function blood(x,y,n=10) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=.5+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.6+Math.random()*.4,max:.8,r:2+Math.random()*3,col:'#c0392b'});
  }
}

function spawnEnemy() {
  const sp = .7+(wave-1)*.12+Math.random()*.25;
  const hp = 1+Math.floor((wave-1)*.6);
  enemies.push({x:-25,y:40+Math.random()*(H-80),vy:(Math.random()-.5)*.4,hp,mhp:hp,sp,r:18,flash:0});
}

function update(dt) {
  if(waveOver) {
    waveDelay-=dt;
    if(waveDelay<=0) {
      waveOver=false; waveKills=0;
      waveTarget=8+wave*4;
      spawnI=Math.max(500, 2200-wave*180);
    }
    return;
  }
  if(reloading) { reloadT-=dt; if(reloadT<=0){reloading=false;ammo=maxAmmo;} }

  spawnT+=dt*1000;
  if(spawnT>=spawnI){spawnT=0;spawnEnemy();}

  bullets = bullets.filter(b => {
    b.x+=b.vx; b.y+=b.vy;
    return b.x>-5&&b.x<W+5&&b.y>-5&&b.y<H+5;
  });

  for(let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    e.x+=e.sp; e.y+=e.vy;
    if(e.y<20)e.vy=Math.abs(e.vy);
    if(e.y>H-20)e.vy=-Math.abs(e.vy);
    if(e.flash>0)e.flash-=dt*4;

    for(let j=bullets.length-1;j>=0;j--) {
      const b=bullets[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+5){
        e.hp--; e.flash=1;
        blood(b.x,b.y,6);
        bullets.splice(j,1);
        if(e.hp<=0){
          blood(e.x,e.y,14);
          score+=10*wave; waveKills++;
          enemies.splice(i,1);
          if(waveKills>=waveTarget){
            enemies=[]; bullets=[];
            wave++; waveOver=true; waveDelay=3;
          }
          break;
        }
      }
    }

    if(i<enemies.length && enemies[i] && enemies[i].x>=player.x-player.r-enemies[i].r) {
      // Use i safely
    }
    if(i<enemies.length && enemies[i] && enemies[i].x>=player.x-34){
      pHP-=8*enemies[i].hp;
      blood(player.x,player.y,12);
      enemies.splice(i,1);
      if(pHP<=0){pHP=0;state='gameover';}
    }
  }

  parts = parts.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vx*=.88; p.vy*=.88; p.life-=dt;
    return p.life>0;
  });
}

function drawBG() {
  cx.fillStyle='#0d1b2a'; cx.fillRect(0,0,W,H);
  // moon
  cx.fillStyle='#f4f4e8'; cx.beginPath(); cx.arc(W-60,45,22,0,Math.PI*2); cx.fill();
  cx.fillStyle='#0d1b2a'; cx.beginPath(); cx.arc(W-53,40,18,0,Math.PI*2); cx.fill();
  // stars
  cx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<30;i++){const sx=(i*137.5+20)%W,sy=(i*89.3)%(H*.55); cx.fillRect(sx,sy,1.5,1.5);}
  // ground
  cx.fillStyle='#1a3a1a'; cx.fillRect(0,H*.68,W,H*.32);
  cx.fillStyle='#152d15';
  for(let x=0;x<W;x+=50){cx.fillRect(x+(waveKills*3%50),H*.68,3,H*.32);}
  // fence on right
  cx.strokeStyle='#8B4513'; cx.lineWidth=4;
  for(let y=0;y<H;y+=30){cx.beginPath();cx.moveTo(W-40,y);cx.lineTo(W-40,y+20);cx.stroke();}
  cx.beginPath();cx.moveTo(W-40,0);cx.lineTo(W-40,H);cx.stroke();
}

function drawPlayer() {
  const ang = Math.atan2(my-player.y, mx-player.x);
  cx.save(); cx.translate(player.x, player.y);
  // shadow
  cx.fillStyle='rgba(0,0,0,.3)'; cx.beginPath(); cx.ellipse(0,18,16,5,0,0,Math.PI*2); cx.fill();
  // legs
  cx.fillStyle='#2c3e50';
  cx.fillRect(-8,10,7,18); cx.fillRect(2,10,7,18);
  // body
  cx.fillStyle='#2ecc71';
  cx.beginPath(); cx.roundRect(-14,-8,28,24,5); cx.fill();
  // head
  cx.fillStyle='#f39c12';
  cx.beginPath(); cx.arc(0,-18,11,0,Math.PI*2); cx.fill();
  // helmet
  cx.fillStyle='#27ae60';
  cx.beginPath(); cx.ellipse(0,-23,11,7,0,Math.PI,0); cx.fill();
  // eyes
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(-4,-18,3,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4,-18,3,0,Math.PI*2); cx.fill();
  // gun
  cx.rotate(ang);
  cx.fillStyle='#555'; cx.beginPath(); cx.roundRect(-4,-3,28,6,2); cx.fill();
  cx.fillStyle='#333'; cx.beginPath(); cx.roundRect(24,-2.5,14,5,1); cx.fill();
  cx.restore();

  // aim laser
  cx.strokeStyle='rgba(255,0,0,.12)'; cx.lineWidth=1; cx.setLineDash([4,4]);
  cx.beginPath(); cx.moveTo(player.x,player.y); cx.lineTo(mx,my); cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle='rgba(255,0,0,.4)'; cx.beginPath(); cx.arc(mx,my,4,0,Math.PI*2); cx.fill();
}

function drawZombie(e) {
  cx.save(); cx.translate(e.x, e.y);
  const fl = e.flash>0;
  const bc = fl?'#fff':'#1e8449', hc = fl?'#fff':'#27ae60';
  // shadow
  cx.fillStyle='rgba(0,0,0,.25)'; cx.beginPath(); cx.ellipse(0,22,15,5,0,0,Math.PI*2); cx.fill();
  // arms reaching right (toward player)
  cx.strokeStyle=bc; cx.lineWidth=5; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(10,-2); cx.lineTo(28,-12); cx.stroke();
  cx.beginPath(); cx.moveTo(10,6); cx.lineTo(28,14); cx.stroke();
  // legs
  cx.fillStyle='#1a5276';
  cx.fillRect(-8,12,7,16); cx.fillRect(1,12,7,16);
  // body
  cx.fillStyle=bc; cx.beginPath(); cx.roundRect(-12,-6,24,22,4); cx.fill();
  // head
  cx.fillStyle=hc; cx.beginPath(); cx.arc(0,-16,12,0,Math.PI*2); cx.fill();
  // eyes
  cx.fillStyle='#e74c3c'; cx.beginPath(); cx.arc(-4,-17,3,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4,-17,3,0,Math.PI*2); cx.fill();
  cx.fillStyle='#900'; cx.beginPath(); cx.arc(-4,-17,1.5,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4,-17,1.5,0,Math.PI*2); cx.fill();
  // mouth
  cx.strokeStyle='#900'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(0,-12,5,.2,Math.PI-.2); cx.stroke();
  // hp bar
  if(e.mhp>1){
    cx.fillStyle='#900'; cx.fillRect(-14,-33,28,5);
    cx.fillStyle='#2ecc71'; cx.fillRect(-14,-33,28*(e.hp/e.mhp),5);
  }
  cx.restore();
}

function drawBullets() {
  for(const b of bullets){
    const ang = Math.atan2(b.vy,b.vx);
    cx.save(); cx.translate(b.x,b.y); cx.rotate(ang);
    cx.fillStyle='#f39c12';
    cx.beginPath(); cx.ellipse(0,0,8,3,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(255,220,50,.3)';
    cx.beginPath(); cx.ellipse(-10,0,8,2,0,0,Math.PI*2); cx.fill();
    cx.restore();
  }
}

function drawParts() {
  for(const p of parts){
    cx.globalAlpha = p.life/p.max;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
}

function drawHUD() {
  cx.fillStyle='rgba(0,0,0,.55)'; cx.beginPath(); cx.roundRect(5,5,W-10,42,6); cx.fill();
  // HP
  cx.fillStyle='#6e0b0b'; cx.beginPath(); cx.roundRect(10,12,140,16,4); cx.fill();
  cx.fillStyle=pHP>50?'#e74c3c':pHP>25?'#e67e22':'#c0392b';
  cx.beginPath(); cx.roundRect(10,12,140*(pHP/maxHP),16,4); cx.fill();
  cx.fillStyle='#fff'; cx.font='bold 11px monospace';
  cx.fillText(`♥ ${Math.ceil(pHP)}%`,15,24);

  // Ammo
  cx.textAlign='center';
  if(reloading){
    const pct = 1-(reloadT/1.8);
    cx.fillStyle='rgba(255,255,255,.15)'; cx.beginPath(); cx.roundRect(W/2-55,12,110,16,4); cx.fill();
    cx.fillStyle='#e67e22'; cx.beginPath(); cx.roundRect(W/2-55,12,110*pct,16,4); cx.fill();
    cx.fillStyle='#fff'; cx.font='bold 11px monospace'; cx.fillText('⟳ RELOADING...',W/2,24);
  } else {
    cx.fillStyle=ammo<=5?'#e74c3c':ammo<=10?'#e67e22':'#f1c40f';
    cx.font='bold 13px monospace';
    cx.fillText(`⬡ ${ammo} / ${maxAmmo}`,W/2,25);
  }

  // Score
  cx.textAlign='right';
  cx.fillStyle='#2ecc71'; cx.font='bold 13px monospace';
  cx.fillText(`${score} pts`,W-12,25);

  // Wave bar
  cx.textAlign='center';
  cx.fillStyle='rgba(255,255,255,.4)'; cx.font='10px monospace';
  cx.fillText(`WAVE ${wave}   KILLS ${waveKills} / ${waveTarget}`,W/2,42);
  cx.textAlign='left';

  // Low ammo warning
  if(!reloading && ammo<=5 && ammo>0){
    cx.fillStyle=`rgba(231,76,60,${.5+.4*Math.sin(Date.now()*.01)})`;
    cx.font='bold 12px monospace'; cx.textAlign='center';
    cx.fillText('LOW AMMO — press R to reload',W/2,H-10);
    cx.textAlign='left';
  }
  if(!reloading && ammo===0){
    cx.fillStyle=`rgba(231,76,60,${.7+.3*Math.sin(Date.now()*.015)})`;
    cx.font='bold 14px monospace'; cx.textAlign='center';
    cx.fillText('NO AMMO! — press R',W/2,H-10);
    cx.textAlign='left';
  }

  if(waveOver){
    cx.fillStyle='rgba(0,0,0,.7)'; cx.beginPath(); cx.roundRect(W/2-130,H/2-40,260,80,8); cx.fill();
    cx.fillStyle='#f1c40f'; cx.font='bold 24px monospace'; cx.textAlign='center';
    cx.fillText(`WAVE ${wave-1} CLEARED!`,W/2,H/2-10);
    cx.fillStyle='#2ecc71'; cx.font='14px monospace';
    cx.fillText(`Wave ${wave} incoming...`,W/2,H/2+16);
    cx.textAlign='left';
  }
  // controls
  cx.fillStyle='rgba(255,255,255,.25)'; cx.font='10px monospace';
  cx.fillText('CLICK: Shoot   R: Reload',8,H-8);
}

function drawMenu() {
  cx.fillStyle='#0d1b2a'; cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<60;i++){cx.fillRect((i*137.5)%W,(i*89.3)%(H*.6),1.5,1.5);}
  cx.fillStyle='#f4f4e8'; cx.beginPath(); cx.arc(W-60,50,24,0,Math.PI*2); cx.fill();
  cx.fillStyle='#0d1b2a'; cx.beginPath(); cx.arc(W-52,44,20,0,Math.PI*2); cx.fill();
  cx.textAlign='center';
  cx.fillStyle='#e74c3c'; cx.font='bold 44px monospace'; cx.fillText('ZOMBIE',W/2,H/2-55);
  cx.fillStyle='#2ecc71'; cx.font='bold 44px monospace'; cx.fillText('DEFENSE',W/2,H/2-5);
  cx.fillStyle='rgba(241,196,15,.9)';
  cx.font=(Math.sin(Date.now()*.003)>.0?'bold ':'')+'17px monospace';
  cx.fillText('▶  Click or SPACE to start  ◀',W/2,H/2+48);
  cx.fillStyle='rgba(255,255,255,.4)'; cx.font='12px monospace';
  cx.fillText('AIM with mouse · CLICK to shoot · R to reload',W/2,H/2+78);
  cx.fillText('Survive the zombie horde — each wave gets harder!',W/2,H/2+98);
  cx.textAlign='left';
}

function drawGameOver() {
  cx.fillStyle='rgba(0,0,0,.78)'; cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#e74c3c'; cx.font='bold 46px monospace'; cx.fillText('GAME OVER',W/2,H/2-65);
  cx.fillStyle='rgba(255,255,255,.8)'; cx.font='bold 18px monospace';
  cx.fillText(`Final Score: ${score}`,W/2,H/2-25);
  cx.fillStyle='rgba(255,255,255,.55)'; cx.font='15px monospace';
  cx.fillText(`Reached Wave ${wave}  ·  ${waveKills} kills this wave`,W/2,H/2+5);
  cx.fillStyle='#2ecc71'; cx.font='bold 16px monospace';
  cx.fillText('Click or SPACE to play again',W/2,H/2+50);
  cx.textAlign='left';
}

function loop(ts) {
  const dt = Math.min((ts-lastT)/1000, .05);
  lastT=ts;
  if(state==='play'){
    update(dt); drawBG(); drawParts(); drawBullets();
    for(const e of enemies) drawZombie(e);
    drawPlayer(); drawHUD();
  } else if(state==='menu') {
    drawMenu();
  } else {
    drawBG(); drawParts();
    for(const e of enemies) drawZombie(e);
    drawPlayer(); drawGameOver();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>

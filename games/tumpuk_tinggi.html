<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Tumpuk Tinggi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
canvas{display:block;touch-action:none;}
</style></head><body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=360,H=580;cv.width=W;cv.height=H;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);cv.style.width=W*s+'px';cv.style.height=H*s+'px';}
resize();window.addEventListener('resize',resize);

// 3D constants
const BH=30,DX=10,DY=-7,GY=H-58,INIT_W=215,PERF=6;

// Block types — richer palette
const TYPES=[
  {name:'Kayu', e:'🪵',f:'#A0522D',t:'#D4873A',s:'#5C2E10',swing:1.0},
  {name:'Bata', e:'🧱',f:'#C0392B',t:'#E8604C',s:'#8B0000',swing:0.7},
  {name:'Bambu',e:'🎋',f:'#2E8B57',t:'#52C87A',s:'#145A32',swing:1.3},
  {name:'Batu', e:'🪨',f:'#4A6FA5',t:'#7EA8D8',s:'#1F3A5F',swing:0.58},
];

const LVLS=[
  {n:'🌿 Pedesaan',s0:'#FCEABB',s1:'#56AB2F',g:'#2D6A1F'},
  {n:'🏖️ Pantai',  s0:'#43C6AC',s1:'#1A78C2',g:'#D4A017'},
  {n:'🌲 Hutan',   s0:'#134E5E',s1:'#1D6B48',g:'#0B3D22'},
  {n:'⛰️ Gunung',  s0:'#606C88',s1:'#3F4C6B',g:'#4A5568'},
  {n:'🏙️ Kota',   s0:'#0F0C29',s1:'#302B63',g:'#1A1A2E'},
  {n:'☁️ Langit',  s0:'#F7971E',s1:'#FFD200',g:'#E65100'},
];

let state='menu',score=0,hi=0,combo=0,bestCombo=0,perfCnt=0;
let blocks=[],sw=null,parts=[],camY=0,tCam=0,sempT=0,aT=0,lastT=0;

function lv(){if(score<20)return 0;if(score<40)return 1;if(score<60)return 2;if(score<80)return 3;if(score<100)return 4;return 5;}
function rndT(){return TYPES[Math.floor(Math.random()*4)];}
function sy(wy){return GY-wy-camY;}

function initGame(){
  state='play';score=0;combo=0;bestCombo=0;perfCnt=0;
  camY=0;tCam=0;sempT=0;parts=[];
  blocks=[{x:W/2-INIT_W/2,wy:0,w:INIT_W,t:TYPES[0]}];
  spawn();
}

function spawn(){
  const top=blocks[blocks.length-1];
  // SLOWER swing: base 0.5, max ~1.1 at level 6
  const spd=(0.5+lv()*0.12)*(0.85+Math.random()*0.3)*top.t.swing;
  sw={x:-top.w,wy:top.wy+BH,w:top.w,t:rndT(),dir:1,spd};
}

function drop(){
  if(state!=='play'||!sw)return;
  const top=blocks[blocks.length-1];
  const lo=Math.max(sw.x,top.x),ro=Math.min(sw.x+sw.w,top.x+top.w),ow=ro-lo;
  if(ow<=0){fallB(sw.x,sw.wy,sw.w,sw.t);state='gameover';if(score>hi)hi=score;return;}
  const perf=Math.abs((sw.x+sw.w/2)-(top.x+top.w/2))<=PERF;
  let nx,nw;
  if(perf){nx=top.x;nw=top.w;combo++;perfCnt++;sempT=2.0;score+=3;sparkle(W/2,sy(sw.wy+BH/2));}
  else{
    nx=lo;nw=ow;
    if(sw.x<top.x)fallB(sw.x,sw.wy,top.x-sw.x,sw.t);
    if(sw.x+sw.w>top.x+top.w)fallB(top.x+top.w,sw.wy,(sw.x+sw.w)-(top.x+top.w),sw.t);
    combo=0;score+=1;
  }
  if(combo>bestCombo)bestCombo=combo;
  blocks.push({x:nx,wy:sw.wy,w:nw,t:sw.t});
  if(nw<14){state='gameover';if(score>hi)hi=score;return;}
  tCam=Math.max(0,GY-sw.wy-135);
  spawn();
}

function fallB(x,wy,w,t){
  parts.push({k:'f',x,y:sy(wy),w,vx:(Math.random()-.5)*2,vy:-2,rot:0,rv:(Math.random()-.5)*.06,f:t.f,s:t.s,life:2.5,max:2.5});
}

function sparkle(x,y){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    parts.push({k:'s',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*4,c:['#FFD700','#FFF9C4','#FFAB40','#fff'][i%4],life:1,max:1});
  }
}

function update(dt){
  if(state!=='play')return;
  if(sw){
    sw.x+=sw.dir*sw.spd*dt*175;
    const mx=W-sw.w-DX-10;
    if(sw.x>=mx){sw.x=mx;sw.dir=-1;}
    if(sw.x<=10){sw.x=10;sw.dir=1;}
  }
  camY+=(tCam-camY)*dt*4;
  if(sempT>0)sempT-=dt;
  parts=parts.filter(p=>{
    p.life-=dt;
    if(p.k==='f'){p.x+=p.vx*50*dt;p.y+=p.vy*50*dt;p.vy+=18*dt;p.rot+=p.rv;}
    else{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;}
    return p.life>0&&p.y<H+80;
  });
}

// Color helpers (hex only)
function adj(h,d){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.max(0,Math.min(255,r+d))},${Math.max(0,Math.min(255,g+d))},${Math.max(0,Math.min(255,b+d))})`;}

function b3D(x,scy,w,fc,tc,sc,a=1){
  if(scy>H+50||scy<-60)return;
  cx.globalAlpha=a;
  // right face with inner gradient for depth
  const rg=cx.createLinearGradient(x+w,scy,x+w+DX,scy+DY);
  rg.addColorStop(0,sc);rg.addColorStop(1,adj(sc,-25));
  cx.fillStyle=rg;cx.beginPath();
  cx.moveTo(x+w,scy);cx.lineTo(x+w+DX,scy+DY);cx.lineTo(x+w+DX,scy+DY+BH);cx.lineTo(x+w,scy+BH);
  cx.closePath();cx.fill();
  // right face edge line
  cx.strokeStyle='rgba(0,0,0,.25)';cx.lineWidth=1;cx.beginPath();
  cx.moveTo(x+w+DX,scy+DY);cx.lineTo(x+w+DX,scy+DY+BH);cx.stroke();
  // top face gradient (light source from top-left)
  const tg=cx.createLinearGradient(x,scy+DY,x+w+DX,scy+DY+4);
  tg.addColorStop(0,adj(tc,55));tg.addColorStop(.4,adj(tc,25));tg.addColorStop(1,adj(tc,5));
  cx.fillStyle=tg;cx.beginPath();
  cx.moveTo(x,scy);cx.lineTo(x+DX,scy+DY);cx.lineTo(x+w+DX,scy+DY);cx.lineTo(x+w,scy);
  cx.closePath();cx.fill();
  // top face edge
  cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=.8;cx.beginPath();
  cx.moveTo(x+DX,scy+DY);cx.lineTo(x+w+DX,scy+DY);cx.stroke();
  // front face — rich gradient
  const fg=cx.createLinearGradient(x,scy,x+w*.3,scy+BH);
  fg.addColorStop(0,adj(fc,40));fg.addColorStop(.3,adj(fc,15));fg.addColorStop(.7,fc);fg.addColorStop(1,adj(fc,-50));
  cx.fillStyle=fg;cx.fillRect(x,scy,w,BH);
  // front top-edge bright line
  cx.fillStyle='rgba(255,255,255,.22)';cx.fillRect(x,scy,w,3);
  // front left bright strip (ambient occlusion fake)
  const ls=cx.createLinearGradient(x,scy,x+12,scy);
  ls.addColorStop(0,'rgba(255,255,255,.14)');ls.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=ls;cx.fillRect(x,scy,12,BH);
  // front bottom dark strip
  cx.fillStyle='rgba(0,0,0,.18)';cx.fillRect(x,scy+BH-4,w,4);
  // outer border
  cx.strokeStyle='rgba(0,0,0,.3)';cx.lineWidth=1;cx.strokeRect(x+.5,scy+.5,w-1,BH-1);
  cx.globalAlpha=1;
}

function drawBG(){
  const L=LVLS[lv()];
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,L.s0);g.addColorStop(1,L.s1);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // glow circle (sun/moon)
  const gc=cx.createRadialGradient(W-45,40,0,W-45,40,55);
  gc.addColorStop(0,'rgba(255,245,180,.5)');gc.addColorStop(1,'rgba(255,245,180,0)');
  cx.fillStyle=gc;cx.fillRect(W-100,0,100,100);
  // ground
  const gs=GY-camY+BH-2;
  const gg=cx.createLinearGradient(0,gs,0,gs+30);
  gg.addColorStop(0,L.g);gg.addColorStop(1,adj(L.g,-30));
  cx.fillStyle=gg;cx.fillRect(0,gs,W,H-gs+10);
  cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(0,gs,W,2);
  // deco
  const li=lv(),dy=GY-camY;
  cx.font='22px serif';cx.textAlign='center';
  if(li===0){cx.fillText('🌴',14,dy-6);cx.fillText('🌾',W-18,dy-4);}
  else if(li===1){cx.fillText('🌊',8,dy+8);cx.fillText('⛵',W-30,dy-26);}
  else if(li===2){cx.fillText('🌲',6,dy-12);cx.fillText('🌲',W-28,dy-12);}
  else if(li===3){cx.fillText('⛰️',4,dy-20);cx.fillText('🌫️',W-30,dy-40);}
  else if(li===4){
    cx.fillStyle='rgba(0,0,0,.35)';
    [0,70,145,220,295].forEach((bx,i)=>cx.fillRect(bx+5,dy-45-i%3*25,28,45+i%3*25));
  }
  else{cx.fillText('⭐',W*.15,dy-30);cx.fillText('🌤️',W*.8,dy-30);}
  cx.textAlign='left';
}

function drawBlocks(){
  for(const b of blocks){
    b3D(b.x,sy(b.wy),b.w,b.t.f,b.t.t,b.t.s);
    if(b.w>40){cx.font='10px serif';cx.textAlign='center';cx.fillText(b.t.e,b.x+b.w/2,sy(b.wy)+BH-5);}
  }
}

function drawSw(){
  if(!sw)return;
  const scy=sy(sw.wy);
  // guide line
  cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1;cx.setLineDash([3,4]);
  cx.beginPath();cx.moveTo(sw.x+sw.w/2,0);cx.lineTo(sw.x+sw.w/2,scy);cx.stroke();cx.setLineDash([]);
  // overlap glow on top block
  const top=blocks[blocks.length-1];
  const lo=Math.max(sw.x,top.x),ro=Math.min(sw.x+sw.w,top.x+top.w);
  if(ro>lo){
    cx.fillStyle='rgba(80,255,120,.13)';cx.fillRect(lo,sy(top.wy)-1,ro-lo,BH+2);
  }
  b3D(sw.x,scy,sw.w,sw.t.f,sw.t.t,sw.t.s,.92);
  if(sw.w>40){cx.font='10px serif';cx.textAlign='center';cx.fillText(sw.t.e,sw.x+sw.w/2,scy+BH-5);}
}

function drawParts(){
  for(const p of parts){
    const a=Math.max(0,p.life/p.max);cx.globalAlpha=a;
    if(p.k==='f'){
      cx.save();cx.translate(p.x+p.w/2,p.y+BH/2);cx.rotate(p.rot);
      const fg=cx.createLinearGradient(0,-BH/2,0,BH/2);
      fg.addColorStop(0,adj(p.f,20));fg.addColorStop(1,adj(p.f,-30));
      cx.fillStyle=fg;cx.beginPath();cx.roundRect(-p.w/2,-BH/2,p.w,BH,3);cx.fill();
      cx.fillStyle=p.s;cx.beginPath();
      cx.moveTo(p.w/2,-BH/2);cx.lineTo(p.w/2+5,-BH/2-4);cx.lineTo(p.w/2+5,BH/2-4);cx.lineTo(p.w/2,BH/2);
      cx.closePath();cx.fill();
      cx.restore();
    }else{
      cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r*a,0,Math.PI*2);cx.fill();
    }
  }cx.globalAlpha=1;
}

function drawHUD(){
  // top bar
  const bar=cx.createLinearGradient(0,0,0,56);
  bar.addColorStop(0,'rgba(0,0,20,.7)');bar.addColorStop(1,'rgba(0,0,20,.35)');
  cx.fillStyle=bar;cx.beginPath();cx.roundRect(6,6,W-12,52,10);cx.fill();
  cx.fillStyle='#FFD700';cx.font='bold 32px monospace';cx.textAlign='center';cx.fillText(score,W/2,44);
  cx.fillStyle='rgba(255,255,255,.75)';cx.font='bold 11px sans-serif';cx.textAlign='left';cx.fillText(LVLS[lv()].n,12,26);
  cx.fillStyle='rgba(255,200,0,.55)';cx.font='10px monospace';cx.fillText('BEST '+hi,12,42);
  cx.fillStyle='rgba(255,255,255,.35)';cx.textAlign='right';cx.font='10px sans-serif';cx.fillText('#'+(blocks.length-1),W-10,26);cx.textAlign='left';
  if(combo>=2){
    const p=1+Math.sin(aT*9)*.07;
    cx.save();cx.translate(W/2,72);cx.scale(p,p);
    cx.fillStyle=combo>=5?'#FF6D00':'#FF9800';cx.font='bold 14px sans-serif';cx.textAlign='center';
    cx.fillText((combo>=5?'🔥':'⚡')+' COMBO x'+combo,0,0);cx.restore();
  }
  if(sempT>0){
    const a=Math.min(1,sempT/.5),sc=1+(1-Math.min(1,sempT))*.12;
    cx.save();cx.translate(W/2,H*.42);cx.scale(sc,sc);cx.globalAlpha=a;
    cx.fillStyle='rgba(0,0,0,.4)';cx.font='bold 34px sans-serif';cx.textAlign='center';cx.fillText('✨ SEMPURNA!',2,2);
    cx.fillStyle='#FFD700';cx.fillText('✨ SEMPURNA!',0,0);
    cx.fillStyle='#fff';cx.font='bold 16px sans-serif';cx.fillText('+3 poin',0,28);
    cx.restore();cx.globalAlpha=1;
  }
  if(blocks.length<=3){
    cx.fillStyle=`rgba(255,255,255,${.45+.4*Math.sin(aT*4)})`;
    cx.font='bold 13px sans-serif';cx.textAlign='center';cx.fillText('👆 TAP untuk jatuhkan blok!',W/2,H-16);
  }
  cx.textAlign='left';
}

function drawMenu(){
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a2e');g.addColorStop(.5,'#0d3b1e');g.addColorStop(1,'#1a5c0e');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<50;i++){
    const blink=Math.sin(aT*2+i)*.3+.4;
    cx.fillStyle=`rgba(255,255,255,${blink})`;
    cx.fillRect((i*137.5+7)%W,(i*97.3+5)%(H*.45),i%3?1:2,i%3?1:2);
  }
  // Preview 3D stack
  const pw=[[70,200],[90,165],[105,135],[118,108]];
  pw.forEach(([x,w],i)=>b3D(x,H*.52-i*32,w,TYPES[i].f,TYPES[i].t,TYPES[i].s,.6+i*.1));
  // Title shadow
  cx.textAlign='center';
  cx.fillStyle='rgba(0,0,0,.5)';cx.font='bold 50px sans-serif';cx.fillText('TUMPUK',W/2+2,H*.27+2);
  cx.fillStyle='#FFD700';cx.font='bold 50px sans-serif';cx.fillText('TUMPUK',W/2,H*.27);
  cx.fillStyle='rgba(0,0,0,.5)';cx.font='bold 58px sans-serif';cx.fillText('TINGGI',W/2+2,H*.36+2);
  cx.fillStyle='#ffffff';cx.font='bold 58px sans-serif';cx.fillText('TINGGI',W/2,H*.36);
  cx.fillStyle='rgba(255,255,255,.5)';cx.font='13px sans-serif';cx.fillText('🌴 Seberapa Tinggi Bisa? 🌴',W/2,H*.415);
  if(hi>0){cx.fillStyle='#FFD700';cx.font='bold 13px monospace';cx.fillText('🏅 Rekor: '+hi,W/2,H*.46);}
  // Play button
  const bp=1+Math.sin(aT*2.5)*.05;
  cx.save();cx.translate(W/2,H*.73);cx.scale(bp,bp);
  const bg=cx.createLinearGradient(-85,-28,85,28);bg.addColorStop(0,'#FF8F00');bg.addColorStop(1,'#E65100');
  cx.fillStyle=bg;cx.shadowColor='rgba(255,143,0,.5)';cx.shadowBlur=18;cx.beginPath();cx.roundRect(-85,-27,170,54,27);cx.fill();cx.shadowBlur=0;
  cx.fillStyle='rgba(255,255,255,.2)';cx.beginPath();cx.roundRect(-85,-27,170,24,{upperLeft:27,upperRight:27,lowerLeft:0,lowerRight:0});cx.fill();
  cx.fillStyle='#fff';cx.font='bold 24px sans-serif';cx.textAlign='center';cx.fillText('▶  MAIN',0,9);cx.restore();
  // How to play
  cx.fillStyle='rgba(255,255,255,.12)';cx.beginPath();cx.roundRect(W/2-72,H*.83,144,36,18);cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=1;cx.beginPath();cx.roundRect(W/2-72,H*.83,144,36,18);cx.stroke();
  cx.fillStyle='rgba(255,255,255,.75)';cx.font='bold 13px sans-serif';cx.textAlign='center';cx.fillText('❓ Cara Main',W/2,H*.83+23);
  cx.textAlign='left';
}

function drawHowTo(){
  // background
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a2e');g.addColorStop(1,'#0d2b40');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // title
  cx.fillStyle='#FFD700';cx.font='bold 20px sans-serif';cx.textAlign='center';cx.fillText('📖 CARA MAIN',W/2,36);
  cx.fillStyle='rgba(255,215,0,.3)';cx.fillRect(30,46,W-60,2);

  // --- Animated demo area ---
  const demoBaseY=130,platX=W/2-80,platW=160;
  // platform
  b3D(platX,demoBaseY,platW,TYPES[0].f,TYPES[0].t,TYPES[0].s);
  // swinging block
  const dX=W/2-55+Math.sin(aT*1.3)*65;
  b3D(dX,demoBaseY-40,110,TYPES[2].f,TYPES[2].t,TYPES[2].s,.9);
  // guide arrow
  cx.fillStyle=`rgba(255,230,0,${.6+.4*Math.sin(aT*4)})`;
  cx.font='bold 16px sans-serif';cx.textAlign='center';cx.fillText('👆 TAP di sini!',W/2,demoBaseY-52);
  // overlap indicator
  const lo2=Math.max(dX,platX),ro2=Math.min(dX+110,platX+platW);
  if(ro2>lo2){cx.fillStyle='rgba(80,255,120,.18)';cx.fillRect(lo2,demoBaseY-1,ro2-lo2,BH+2);}

  // --- Instructions ---
  const rows=[
    {e:'1️⃣',c:'#81D4FA',t:'Blok berayun kiri dan kanan otomatis'},
    {e:'2️⃣',c:'#A5D6A7',t:'TAP / klik untuk jatuhkan blok'},
    {e:'✂️', c:'#FFCC80',t:'Bagian yang melebihi tepi terpotong'},
    {e:'✨',c:'#FFD700',t:'Pas di tengah = SEMPURNA! (+3 poin)'},
    {e:'🔥',c:'#FF8A65',t:'Sempurna beruntun = COMBO bonus!'},
    {e:'💀',c:'#EF9A9A',t:'Blok terlalu tipis = Game Over'},
  ];
  rows.forEach((r,i)=>{
    const ry=175+i*43;
    cx.fillStyle='rgba(255,255,255,.06)';cx.beginPath();cx.roundRect(14,ry-18,W-28,36,8);cx.fill();
    cx.strokeStyle=r.c+'44';cx.lineWidth=1;cx.beginPath();cx.roundRect(14,ry-18,W-28,36,8);cx.stroke();
    cx.fillStyle=r.c+'dd';cx.fillRect(14,ry-18,4,36);// accent bar
    cx.font='16px serif';cx.fillText(r.e,26,ry+5);
    cx.fillStyle='rgba(255,255,255,.88)';cx.font='12.5px sans-serif';cx.textAlign='left';cx.fillText(r.t,52,ry+5);
  });

  // --- Block types ---
  cx.fillStyle='rgba(255,255,255,.08)';cx.beginPath();cx.roundRect(14,445,W-28,68,10);cx.fill();
  cx.fillStyle='rgba(255,255,255,.5)';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText('JENIS BLOK',W/2,463);
  TYPES.forEach((t,i)=>{
    const bx=28+i*82,by=470;
    b3D(bx,by,64,t.f,t.t,t.s);
    cx.font='9px sans-serif';cx.fillStyle='rgba(255,255,255,.7)';cx.textAlign='center';
    cx.fillText(t.e+' '+t.name,bx+32,by+BH+14);
  });

  // Back button
  cx.fillStyle='rgba(255,255,255,.12)';cx.beginPath();cx.roundRect(W/2-70,H-36,140,30,15);cx.fill();
  cx.fillStyle='rgba(255,255,255,.7)';cx.font='bold 13px sans-serif';cx.textAlign='center';
  cx.fillText('← Kembali ke Menu',W/2,H-16);
  cx.textAlign='left';
}

function drawGameOver(){
  cx.fillStyle='rgba(0,0,10,.82)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  // panel
  const pg=cx.createLinearGradient(W/2-130,H/2-170,W/2+130,H/2+160);
  pg.addColorStop(0,'#0d2137');pg.addColorStop(1,'#0d3b1e');
  cx.fillStyle=pg;cx.beginPath();cx.roundRect(W/2-130,H/2-170,260,330,16);cx.fill();
  cx.strokeStyle='rgba(255,215,0,.5)';cx.lineWidth=2;cx.beginPath();cx.roundRect(W/2-130,H/2-170,260,330,16);cx.stroke();
  cx.fillStyle='#FF5252';cx.font='bold 24px sans-serif';cx.fillText('— GAME OVER —',W/2,H/2-135);
  cx.fillStyle='#FFD700';cx.font='bold 62px monospace';cx.fillText(score,W/2,H/2-65);
  if(score>0&&score>=hi){
    cx.fillStyle='#FFD700';cx.font='bold 15px sans-serif';cx.fillText('🎉 REKOR BARU! 🎉',W/2,H/2-28);
  }else{
    cx.fillStyle='rgba(255,255,255,.45)';cx.font='12px monospace';cx.fillText('Rekor: '+hi,W/2,H/2-28);
  }
  cx.fillStyle='rgba(255,255,255,.6)';cx.font='12px sans-serif';
  cx.fillText('✨ Sempurna: '+perfCnt+'x',W/2,H/2+5);
  cx.fillText('🔥 Combo Terbaik: '+bestCombo+'x',W/2,H/2+28);
  cx.fillText('📦 Blok Tertumpuk: '+(blocks.length-1),W/2,H/2+51);
  // btn
  const bg2=cx.createLinearGradient(W/2-80,H/2+80,W/2+80,H/2+130);
  bg2.addColorStop(0,'#FF8F00');bg2.addColorStop(1,'#E65100');
  cx.fillStyle=bg2;cx.shadowColor='rgba(255,143,0,.4)';cx.shadowBlur=14;cx.beginPath();cx.roundRect(W/2-85,H/2+80,170,50,25);cx.fill();cx.shadowBlur=0;
  cx.fillStyle='#fff';cx.font='bold 18px sans-serif';cx.fillText('🔄 MAIN LAGI',W/2,H/2+111);
  cx.textAlign='left';
}

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect(),ex=(e.clientX-r.left)*(W/r.width),ey=(e.clientY-r.top)*(H/r.height);
  if(state==='menu'){
    if(ey>H*.83&&ey<H*.83+36&&ex>W/2-72&&ex<W/2+72){state='howto';return;}
    initGame();return;
  }
  if(state==='howto'){initGame();return;}// any tap starts
  if(state==='gameover'){if(ex>W/2-85&&ex<W/2+85&&ey>H/2+80&&ey<H/2+130)initGame();return;}
  if(state==='play')drop();
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect(),t=e.touches[0];
  const ex=(t.clientX-r.left)*(W/r.width),ey=(t.clientY-r.top)*(H/r.height);
  if(state==='menu'){
    if(ey>H*.83&&ey<H*.83+36)state='howto';
    else initGame();return;
  }
  if(state==='howto'){initGame();return;}
  if(state==='gameover'){initGame();return;}
  if(state==='play')drop();
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();
    if(state==='play')drop();
    else if(state==='menu'||state==='gameover'||state==='howto')initGame();}
});

function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;aT+=dt;
  if(state==='menu')drawMenu();
  else if(state==='howto')drawHowTo();
  else if(state==='play'){update(dt);drawBG();drawBlocks();drawSw();drawParts();drawHUD();}
  else{drawBG();drawBlocks();drawParts();drawGameOver();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script></body></html>
